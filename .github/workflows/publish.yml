name: Publish to Modrinth

# Fires whenever you publish a GitHub Release. The release tag (e.g. v1.2.0) and
# its notes become the Modrinth version number and changelog automatically.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: vbRcbu5L
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: build/libs/!(*-sources).jar
          # Pull version number + changelog straight from the GitHub release.
          name: ElytraWEEE ${{ github.event.release.tag_name }}
          version: ${{ github.event.release.tag_name }}
          changelog: ${{ github.event.release.body }}
          version-type: release
          loaders: fabric
          game-versions: "26.1.2"
          dependencies: |
            fabric-api(required)
            cloth-config(required)
            modmenu(optional)
